site_name: go-yfinance Docs
site_url: https://wnjoon.github.io/go-yfinance/
repo_url: https://github.com/wnjoon/go-yfinance
repo_name: wnjoon/go-yfinance

docs_dir: docs

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.top
    - search.suggest
    - navigation.expand

nav:
  - Home: index.md
  - API Reference:
    - Overview: API.md
    - ticker: api/ticker.md
    - multi: api/multi.md
    - screener: api/screener.md
    - search: api/search.md
    - lookup: api/lookup.md
    - market: api/market.md
    - sector: api/sector.md
    - industry: api/industry.md
    - calendars: api/calendars.md
    - live: api/live.md
    - models: api/models.md
    - client: api/client.md
    - config: api/config.md
    - cache: api/cache.md
    - repair: api/repair.md
    - stats: api/stats.md
    - utils: api/utils.md
  - Advanced:
    - Price Repair: advanced/price-repair.md
    - MIC Codes: advanced/mic-codes.md
  - Releases:
    - v1.4.1: releases/RELEASE_NOTES_v1.4.1.md
    - v1.4.0: releases/RELEASE_NOTES_v1.4.0.md
    - v1.3.0: releases/RELEASE_NOTES_v1.3.0.md
    - v1.2.0: releases/RELEASE_NOTES_v1.2.0.md
    - v1.1.0: releases/RELEASE_NOTES_v1.1.0.md
    - v1.0.0: releases/RELEASE_NOTES_v1.0.0.md
  - Development:
    - v1.4.0 Progress: development/v1.4.0-progress.md
    - v1.3.0 Progress: development/v1.3.0-progress.md
    - v1.2.0 Progress: development/v1.2.0-progress.md
    - v1.1.0 Progress: development/v1.1.0-progress.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
